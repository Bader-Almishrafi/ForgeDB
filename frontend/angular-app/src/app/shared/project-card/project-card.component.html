<article class="group flex min-h-64 flex-col rounded-2xl border border-slate-200 bg-white p-5 shadow-sm shadow-slate-200/40 transition duration-200 hover:-translate-y-0.5 hover:border-blue-200 hover:shadow-lg hover:shadow-slate-200/60 dark:border-slate-700 dark:bg-slate-900 dark:shadow-black/10 dark:hover:border-blue-700 dark:hover:shadow-black/20">
  <div class="flex items-start justify-between gap-4">
    <div class="grid h-11 w-11 shrink-0 place-items-center rounded-xl bg-blue-50 text-blue-700 ring-1 ring-blue-100 dark:bg-blue-950/60 dark:text-blue-300 dark:ring-blue-900">
      <svg viewBox="0 0 24 24" class="h-5 w-5 fill-none stroke-current" stroke-width="1.7" aria-hidden="true">
        <ellipse cx="12" cy="6" rx="6.5" ry="2.75"></ellipse>
        <path d="M5.5 6v6c0 1.52 2.91 2.75 6.5 2.75s6.5-1.23 6.5-2.75V6M5.5 12v6c0 1.52 2.91 2.75 6.5 2.75s6.5-1.23 6.5-2.75v-6"></path>
      </svg>
    </div>
    <span class="inline-flex items-center gap-1.5 rounded-full bg-slate-100 px-2.5 py-1 text-xs font-semibold text-slate-600 ring-1 ring-inset ring-slate-200 dark:bg-slate-800 dark:text-slate-300 dark:ring-slate-700"
      title="The project API does not currently provide a status field">
      <span class="h-1.5 w-1.5 rounded-full bg-slate-400" aria-hidden="true"></span>
      Status unavailable
    </span>
  </div>

  <div class="mt-5 min-w-0 flex-1">
    <h3 class="truncate text-lg font-semibold tracking-tight text-slate-950 dark:text-slate-100" [title]="project().name">
      {{ project().name }}
    </h3>
    <p class="mt-2 line-clamp-2 min-h-10 text-sm leading-5 text-slate-500 dark:text-slate-400">
      {{ project().description || 'No description provided.' }}
    </p>
  </div>

  <div class="mt-5 flex items-center gap-2 border-t border-slate-100 pt-4 text-xs text-slate-500 dark:border-slate-800 dark:text-slate-400">
    <svg viewBox="0 0 24 24" class="h-4 w-4 fill-none stroke-current" stroke-width="1.8" aria-hidden="true">
      <path d="M7 3v3m10-3v3M4 9h16M5 5h14a1 1 0 0 1 1 1v14H4V6a1 1 0 0 1 1-1Z"></path>
    </svg>
    <span>{{ dateLabel() }} {{ relevantDate() | date:'mediumDate' }}</span>
  </div>

  <div class="mt-4 grid grid-cols-[1fr_auto_auto] gap-2">
    <button type="button" class="btn-primary" (click)="openProject.emit(project())" [attr.aria-label]="'Open ' + project().name">
      Open
      <svg viewBox="0 0 24 24" class="h-4 w-4 fill-none stroke-current" stroke-width="1.8" aria-hidden="true"><path d="m9 5 7 7-7 7"></path></svg>
    </button>
    <button type="button" class="icon-button" disabled
      [attr.aria-label]="'Edit ' + project().name + ' (unavailable: project update API is not implemented)'"
      title="Editing is unavailable until the project update API is implemented">
      <svg viewBox="0 0 24 24" class="h-4 w-4 fill-none stroke-current" stroke-width="1.8" aria-hidden="true"><path d="m4 16-.75 4.75L8 20l11-11-4-4L4 16Zm9-9 4 4"></path></svg>
    </button>
    <button type="button" class="icon-button text-rose-600 dark:text-rose-400" disabled
      [attr.aria-label]="'Delete ' + project().name + ' (unavailable: project delete API is not implemented)'"
      title="Deletion is unavailable until the project delete API is implemented">
      <svg viewBox="0 0 24 24" class="h-4 w-4 fill-none stroke-current" stroke-width="1.8" aria-hidden="true"><path d="M4 7h16M9 7V4h6v3m-9 0 1 14h10l1-14M10 11v6m4-6v6"></path></svg>
    </button>
  </div>
</article>
