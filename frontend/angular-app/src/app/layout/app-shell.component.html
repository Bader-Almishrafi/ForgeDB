<div class="min-h-screen bg-[#f7f9fc] text-slate-900">
	@if (sidebarOpen()) {
	<button type="button" aria-label="Close navigation" class="fixed inset-0 z-40 bg-slate-950/45 lg:hidden"
		(click)="closeSidebar()"></button>
	}

	<aside
		class="fixed inset-y-0 left-0 z-50 flex w-[230px] flex-col bg-gradient-to-b from-[#0d213f] via-[#0b1e39] to-[#07162d] px-3 py-5 text-white shadow-2xl transition-transform duration-300 lg:translate-x-0"
		[ngClass]="sidebarOpen() ? 'translate-x-0' : '-translate-x-full'">
		<div class="flex items-center gap-3 px-3 pb-7">
			<div
				class="grid h-11 w-11 place-items-center rounded-2xl bg-gradient-to-br from-indigo-500 to-violet-600 shadow-lg shadow-indigo-900/30">
				<svg viewBox="0 0 24 24" class="h-7 w-7 fill-none stroke-white" stroke-width="1.8">
					<ellipse cx="12" cy="5.5" rx="7" ry="3"></ellipse>
					<path d="M5 5.5v6c0 1.66 3.13 3 7 3s7-1.34 7-3v-6M5 11.5v6c0 1.66 3.13 3 7 3s7-1.34 7-3v-6"></path>
				</svg>
			</div>
			<span class="text-2xl font-bold tracking-tight">ForgeDB</span>
		</div>

		<nav class="flex-1 space-y-1 overflow-y-auto pr-1 scrollbar-thin">
			@for (item of navItems; track item.route) {
			<a [routerLink]="item.route"
				routerLinkActive="bg-gradient-to-r from-indigo-600 to-violet-600 text-white shadow-lg shadow-indigo-950/25"
				class="flex items-center gap-3 rounded-xl px-3.5 py-3 text-sm font-medium text-slate-300 transition hover:bg-white/8 hover:text-white"
				(click)="closeSidebar()">
				<svg viewBox="0 0 24 24" class="h-5 w-5 fill-none stroke-current" stroke-linecap="round"
					stroke-linejoin="round" stroke-width="1.7">
					<path [attr.d]="item.icon"></path>
				</svg>
				<span>{{ item.label }}</span>
			</a>
			}
		</nav>

		<div class="mt-4 border-t border-white/10 pt-4">
			<button type="button"
				class="flex w-full items-center gap-3 rounded-xl px-3.5 py-3 text-sm text-slate-300 transition hover:bg-white/8 hover:text-white">
				<span class="grid h-6 w-6 place-items-center rounded-full border border-slate-500 text-xs">?</span>
				Help & Support
			</button>
		</div>
	</aside>

	<div class="min-h-screen lg:pl-[230px]">
		<header
			class="sticky top-0 z-30 flex h-[72px] items-center justify-between border-b border-slate-200/80 bg-white/90 px-4 backdrop-blur-xl lg:px-7">
			<div class="flex items-center gap-3">
				<button type="button"
					class="grid h-10 w-10 place-items-center rounded-xl text-slate-600 hover:bg-slate-100 lg:hidden"
					(click)="toggleSidebar()" aria-label="Open navigation">
					<svg viewBox="0 0 24 24" class="h-6 w-6 fill-none stroke-current" stroke-width="1.8">
						<path d="M4 7h16M4 12h16M4 17h16"></path>
					</svg>
				</button>
				<div class="relative hidden sm:block">
					<svg viewBox="0 0 24 24"
						class="pointer-events-none absolute left-3 top-1/2 h-5 w-5 -translate-y-1/2 fill-none stroke-slate-400"
						stroke-width="1.7">
						<circle cx="11" cy="11" r="7"></circle>
						<path d="m16 16 4 4"></path>
					</svg>
					<input
						class="w-[320px] rounded-xl border border-slate-200 bg-slate-50 py-2.5 pl-10 pr-4 text-sm outline-none transition focus:border-indigo-300 focus:bg-white focus:ring-4 focus:ring-indigo-100 xl:w-[430px]"
						placeholder="Search projects, data sources, analyses..." />
				</div>
			</div>

			<div class="flex items-center gap-3">
				<button type="button"
					class="relative grid h-10 w-10 place-items-center rounded-xl text-slate-600 hover:bg-slate-100"
					aria-label="Notifications">
					<svg viewBox="0 0 24 24" class="h-5 w-5 fill-none stroke-current" stroke-width="1.7">
						<path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7M10 20h4"></path>
					</svg>
					<span
						class="absolute right-1.5 top-1.5 grid h-4 min-w-4 place-items-center rounded-full bg-violet-600 px-1 text-[10px] font-bold text-white">3</span>
				</button>

				@if (isLoggedIn()) {
				<div class="relative">

					<button type="button" (click)="toggleDropdown()"
						class="flex items-center gap-2 rounded-xl px-2 py-1.5 hover:bg-slate-100 cursor-pointer text-left outline-none">
						<div
							class="grid h-10 w-10 place-items-center rounded-full bg-gradient-to-br from-indigo-500 to-violet-600 text-sm font-bold text-white">
							AH</div>
						<div class="hidden sm:block">
							<p class="text-sm font-semibold text-slate-800">Ahmed</p>
							<p class="text-xs text-slate-500">Admin</p>
						</div>
						<svg viewBox="0 0 24 24"
							class="hidden h-4 w-4 fill-none stroke-slate-500 sm:block transition-transform duration-200"
							[ngClass]="{'rotate-180': dropdownOpen()}" stroke-width="1.8">
							<path d="m7 10 5 5 5-5"></path>
						</svg>
					</button>

					@if (dropdownOpen()) {
					<div
						class="absolute right-0 mt-2 w-48 rounded-2xl border border-slate-200/80 bg-white p-2 shadow-xl ring-1 ring-black/5 z-50">

						<a routerLink="/app/settings" (click)="dropdownOpen.set(false)"
							class="flex items-center gap-2.5 rounded-xl px-3 py-2.5 text-sm text-slate-600 hover:bg-slate-50 transition">
							<svg viewBox="0 0 24 24" class="h-4 w-4 fill-none stroke-slate-400" stroke-width="1.8">
								<path
									d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10Zm0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5Z" />
							</svg>
							My Profile
						</a>

						<div class="my-1 border-t border-slate-100"></div>

						<button type="button" (click)="logout()"
							class="flex w-full items-center gap-2.5 rounded-xl px-3 py-2.5 text-sm font-medium text-rose-600 hover:bg-rose-50 transition">
							<svg viewBox="0 0 24 24" class="h-4 w-4 fill-none stroke-rose-500" stroke-width="1.8">
								<path stroke-linecap="round" stroke-linejoin="round"
									d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75" />
							</svg>
							Log out
						</button>

					</div>
					}

				</div>
				} @else {
				<div class="flex items-center gap-2">
					<a routerLink="/login"
						class="rounded-xl px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 transition">
						Sign In
					</a>
					<a routerLink="/signup"
						class="rounded-xl bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-md hover:bg-indigo-700 transition">
						Register
					</a>
				</div>
				}
			</div>
		</header>

		<main class="p-4 sm:p-6 lg:p-7">
			<router-outlet />
		</main>
	</div>
</div>
