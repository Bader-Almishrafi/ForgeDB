<div class="min-h-screen bg-slate-50 text-slate-950 dark:bg-[#0d1117] dark:text-slate-100" data-testid="simple-app-shell">
  <header class="sticky top-0 z-30 border-b border-slate-200 bg-white/95 backdrop-blur dark:border-slate-800 dark:bg-[#161b22]/95">
    <div class="mx-auto flex min-h-16 max-w-[1600px] items-center gap-6 px-4 sm:px-6">
      <a routerLink="/projects" class="text-lg font-bold tracking-tight text-indigo-700 dark:text-indigo-300">ForgeDB</a>
      <a routerLink="/projects" class="text-sm font-semibold text-slate-600 hover:text-indigo-700 dark:text-slate-300">Projects</a>
      <span class="flex-1"></span>
      <div class="relative">
        <button type="button" class="flex items-center gap-2 rounded-lg px-2 py-1.5 text-sm hover:bg-slate-100 dark:hover:bg-slate-800"
          aria-label="Account menu" [attr.aria-expanded]="accountOpen()" (click)="accountOpen.set(!accountOpen())">
          <span class="grid h-8 w-8 place-items-center rounded-full bg-indigo-600 text-xs font-bold text-white">{{ initials() }}</span>
          <span class="hidden sm:inline">{{ user()?.firstName || 'Account' }}</span>
        </button>
        @if (accountOpen()) {
          <div class="absolute right-0 mt-2 w-52 rounded-xl border border-slate-200 bg-white p-2 shadow-xl dark:border-slate-700 dark:bg-slate-900" role="menu">
            <a routerLink="/change-password" class="block rounded-lg px-3 py-2 text-sm hover:bg-slate-100 dark:hover:bg-slate-800" (click)="accountOpen.set(false)">Change password</a>
            <button type="button" class="block w-full rounded-lg px-3 py-2 text-left text-sm hover:bg-slate-100 dark:hover:bg-slate-800" (click)="toggleTheme()">
              {{ theme() === 'dark' ? 'Use light theme' : 'Use dark theme' }}
            </button>
            <button type="button" class="block w-full rounded-lg px-3 py-2 text-left text-sm text-rose-600 hover:bg-rose-50 dark:hover:bg-rose-950/30" (click)="logout()">Sign out</button>
          </div>
        }
      </div>
    </div>
  </header>
  <main class="mx-auto max-w-[1600px] px-4 py-6 sm:px-6">
    <router-outlet />
  </main>
</div>
