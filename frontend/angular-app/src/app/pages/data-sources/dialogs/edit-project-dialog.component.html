@if (isOpen) {
  <div class="fixed inset-0 z-[80] grid place-items-center bg-slate-950/55 p-4 backdrop-blur-[2px]" role="dialog" aria-modal="true" aria-labelledby="edit-project-title">
    <section class="animate-dialog w-full max-w-lg rounded-2xl border border-slate-200 bg-white p-6 shadow-2xl dark:border-[#30363d] dark:bg-[#161b22]">
      <h2 id="edit-project-title" class="text-xl font-bold">Edit project</h2>
      <label class="mt-5 block">
        <span class="text-sm font-semibold">Name</span>
        <input type="text" maxlength="100" class="input-field mt-2" [ngModel]="editName()" (ngModelChange)="editName.set($event)">
      </label>
      <label class="mt-4 block">
        <span class="text-sm font-semibold">Description</span>
        <textarea maxlength="500" class="input-field mt-2 min-h-28" [ngModel]="editDescription()" (ngModelChange)="editDescription.set($event)"></textarea>
      </label>
      @if (editError()) { <p class="mt-4 text-sm text-rose-600" role="alert">{{ editError() }}</p> }
      <div class="mt-6 flex justify-end gap-3">
        <button type="button" class="btn-secondary" (click)="close()" [disabled]="savingProject()">Cancel</button>
        <button type="button" class="btn-primary" data-testid="save-project-button" (click)="saveProject()" [disabled]="!editName().trim() || editName().length > 100 || editDescription().length > 500 || savingProject()">{{ savingProject() ? 'Saving…' : 'Save' }}</button>
      </div>
    </section>
  </div>
}
