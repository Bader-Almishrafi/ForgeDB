@if (isOpen && dataset) {
  <div class="fixed inset-0 z-[80] grid place-items-center bg-slate-950/55 p-4 backdrop-blur-[2px]" role="dialog" aria-modal="true" aria-labelledby="delete-title">
    <section class="animate-dialog w-full max-w-md rounded-2xl border border-slate-200 bg-white p-6 shadow-2xl dark:border-[#30363d] dark:bg-[#161b22]">
      <h2 id="delete-title" class="text-xl font-bold">Delete {{ dataset.tableName }}?</h2>
      <p class="mt-2 text-sm text-slate-500">This removes the dataset from the project.</p>
      @if (deleteError()) { <p class="mt-4 text-sm text-rose-600" role="alert">{{ deleteError() }}</p> }
      <div class="mt-6 flex justify-end gap-3">
        <button type="button" class="btn-secondary" (click)="close()" [disabled]="deleting()">Cancel</button>
        <button type="button" class="btn-danger" data-testid="confirm-delete-dataset" (click)="deleteDataset()" [disabled]="deleting()">{{ deleting() ? 'Deleting…' : 'Delete' }}</button>
      </div>
    </section>
  </div>
}
