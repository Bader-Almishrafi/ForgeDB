@if (isOpen && dataset) {
  <div class="fixed inset-0 z-[80] grid place-items-center bg-slate-950/55 p-4 backdrop-blur-[2px]" role="dialog" aria-modal="true" aria-labelledby="replace-title">
    <section class="animate-dialog w-full max-w-lg rounded-2xl border border-slate-200 bg-white p-6 shadow-2xl dark:border-[#30363d] dark:bg-[#161b22]">
      <h2 id="replace-title" class="text-xl font-bold">Replace dataset source</h2>
      <p class="mt-2 text-sm text-slate-500">Upload a non-empty CSV. The backend will create a new active version and keep version history.</p>
      <input data-testid="replace-file-input" type="file" accept=".csv,text/csv" class="mt-5 block w-full text-sm" (change)="onReplaceFileSelected($event)">
      @if (replaceFile(); as file) { <p class="mt-2 text-sm">{{ file.name }} · {{ formatSize(file.size) }}</p> }
      @if (replaceError()) { <p class="mt-4 text-sm text-rose-600" role="alert">{{ replaceError() }}</p> }
      <div class="mt-6 flex justify-end gap-3">
        <button type="button" class="btn-secondary" (click)="close()" [disabled]="replacing()">Cancel</button>
        <button type="button" class="btn-primary" data-testid="confirm-replace-button" (click)="replaceDataset()" [disabled]="!replaceFile() || replacing()">{{ replacing() ? 'Replacing…' : 'Replace' }}</button>
      </div>
    </section>
  </div>
}
