<article class="chart-card" data-analysis-chart>
  <header>
    <h3 class="chart-title">{{ title() }}</h3>
    @if (description()) { <p class="chart-description">{{ description() }}</p> }
  </header>

  @if (points().length) {
    <dl class="chart-list" role="img" [attr.aria-label]="title()">
      @for (point of points(); track point.label) {
        <div class="chart-row">
          <dt class="chart-label" [title]="point.label">{{ point.label }}</dt>
          <dd class="chart-value">{{ point.value }}</dd>
          <dd class="chart-track" aria-hidden="true">
            <span class="chart-bar" [style.width.%]="barWidth(point.value)"></span>
          </dd>
        </div>
      }
    </dl>
  } @else {
    <p class="chart-empty">{{ emptyMessage() }}</p>
  }
</article>
