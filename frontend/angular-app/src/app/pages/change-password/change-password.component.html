<section class="mx-auto w-full max-w-2xl px-4 py-8 sm:px-6">
  <div class="card p-6 sm:p-8">
    <div class="mb-8">
      <h1 class="page-title">Change Password</h1>

      <p class="page-subtitle">
        Enter your current password and choose a new password.
      </p>
    </div>

    <form
      #changePasswordForm="ngForm"
      (ngSubmit)="changePasswordForm.form.valid && onSubmit()"
      class="flex flex-col gap-5"
    >
      <label>
        <span
          class="mb-2 block text-sm font-semibold text-slate-800 dark:text-slate-200"
        >
          Current Password
        </span>

        <input
          type="password"
          name="currentPassword"
          [(ngModel)]="currentPassword"
          #currentPasswordInput="ngModel"
          class="input-field"
          placeholder="Enter current password"
          required
        >

        @if (
          currentPasswordInput.invalid &&
          (currentPasswordInput.dirty || currentPasswordInput.touched)
        ) {
          <p class="mt-1 text-xs font-semibold text-rose-600 dark:text-rose-400">
            Current password is required.
          </p>
        }
      </label>

      <label>
        <span
          class="mb-2 block text-sm font-semibold text-slate-800 dark:text-slate-200"
        >
          New Password
        </span>

        <input
          type="password"
          name="newPassword"
          [(ngModel)]="newPassword"
          #newPasswordInput="ngModel"
          class="input-field"
          placeholder="At least 8 characters"
          required
          minlength="8"
        >

        @if (
          newPasswordInput.invalid &&
          (newPasswordInput.dirty || newPasswordInput.touched)
        ) {
          <p class="mt-1 text-xs font-semibold text-rose-600 dark:text-rose-400">
            New password must be at least 8 characters.
          </p>
        }
      </label>

      <label>
        <span
          class="mb-2 block text-sm font-semibold text-slate-800 dark:text-slate-200"
        >
          Confirm New Password
        </span>

        <input
          type="password"
          name="confirmPassword"
          [(ngModel)]="confirmPassword"
          #confirmPasswordInput="ngModel"
          class="input-field"
          placeholder="Enter the new password again"
          required
          minlength="8"
        >

        @if (
          confirmPassword &&
          newPassword !== confirmPassword &&
          (confirmPasswordInput.dirty || confirmPasswordInput.touched)
        ) {
          <p class="mt-1 text-xs font-semibold text-rose-600 dark:text-rose-400">
            New passwords do not match.
          </p>
        }
      </label>

      @if (errorMessage) {
        <p
          class="rounded-xl border border-rose-200 bg-rose-50 px-3 py-2 text-sm font-semibold text-rose-700 dark:border-rose-900/30 dark:bg-rose-900/10 dark:text-rose-400"
        >
          {{ errorMessage }}
        </p>
      }

      <div class="flex flex-col-reverse gap-3 pt-2 sm:flex-row sm:justify-end">
        <a
          routerLink="/home"
          class="inline-flex items-center justify-center rounded-xl border border-slate-300 px-5 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-50 dark:border-slate-600 dark:text-slate-200 dark:hover:bg-[#21262d]"
        >
          Cancel
        </a>

        <button
          type="submit"
          class="btn-primary"
          [disabled]="
            !changePasswordForm.form.valid ||
            newPassword !== confirmPassword ||
            isLoading
          "
        >
          {{ isLoading ? 'Changing password...' : 'Change password' }}
        </button>
      </div>
    </form>
  </div>
</section>
