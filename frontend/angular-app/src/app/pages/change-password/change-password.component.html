<section class="grid-surface relative -m-4 grid min-h-[calc(100vh-5rem)] place-items-center overflow-hidden p-4 pb-10 pt-20 sm:-m-6 sm:p-8 lg:-m-8 lg:p-10" aria-labelledby="change-password-title">
  <div class="page-glow pointer-events-none absolute inset-0"></div>
  <a routerLink="/home" class="absolute left-5 top-5 z-10 flex items-center gap-2 text-sm font-semibold text-slate-500 transition hover:text-indigo-600 dark:text-[#8a99ad] dark:hover:text-white">
    <svg viewBox="0 0 24 24" class="h-5 w-5 fill-none stroke-current" stroke-width="2" aria-hidden="true"><path d="m10 19-7-7 7-7M3 12h18"></path></svg>
    Back to Home
  </a>

  <div class="glass-card relative z-10 w-full max-w-[480px] p-8 sm:p-10">
    <div class="mb-8 text-center">
      <h1 id="change-password-title" class="page-title">Change Password</h1>
      <p class="page-subtitle">Confirm your current password, then choose a new one.</p>
    </div>

    <form #changePasswordForm="ngForm" (ngSubmit)="changePasswordForm.form.valid && onSubmit()" class="flex flex-col gap-5">
      <label>
        <span class="mb-2 block text-sm font-semibold text-slate-800 dark:text-slate-200">Current Password</span>
        <input type="password" name="currentPassword" [(ngModel)]="currentPassword" #currentPasswordInput="ngModel" class="input-field" placeholder="Enter current password" autocomplete="current-password" required>
        @if (currentPasswordInput.invalid && (currentPasswordInput.dirty || currentPasswordInput.touched)) {
          <p class="mt-1 text-xs font-semibold text-rose-600 dark:text-rose-400">Current password is required.</p>
        }
      </label>

      <label>
        <span class="mb-2 block text-sm font-semibold text-slate-800 dark:text-slate-200">New Password</span>
        <input type="password" name="newPassword" [(ngModel)]="newPassword" #newPasswordInput="ngModel" class="input-field" placeholder="At least 8 characters" autocomplete="new-password" required minlength="8">
        @if (newPasswordInput.invalid && (newPasswordInput.dirty || newPasswordInput.touched)) {
          <p class="mt-1 text-xs font-semibold text-rose-600 dark:text-rose-400">New password must be at least 8 characters.</p>
        }
      </label>

      <label>
        <span class="mb-2 block text-sm font-semibold text-slate-800 dark:text-slate-200">Confirm New Password</span>
        <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" #confirmPasswordInput="ngModel" class="input-field" placeholder="Enter the new password again" autocomplete="new-password" required minlength="8">
        @if (confirmPassword && newPassword !== confirmPassword && (confirmPasswordInput.dirty || confirmPasswordInput.touched)) {
          <p class="mt-1 text-xs font-semibold text-rose-600 dark:text-rose-400">New passwords do not match.</p>
        }
      </label>

      @if (errorMessage) {
        <p class="rounded-xl border border-rose-200 bg-rose-50 px-3 py-2 text-sm font-semibold text-rose-700 dark:border-rose-900/30 dark:bg-rose-900/10 dark:text-rose-400" role="alert">{{ errorMessage }}</p>
      }

      <button type="submit" class="btn-primary" [disabled]="!changePasswordForm.form.valid || newPassword !== confirmPassword || isLoading">
        {{ isLoading ? 'Changing password...' : 'Change Password' }}
      </button>
      <a routerLink="/home" class="text-center text-sm font-semibold text-indigo-600 hover:text-indigo-700 dark:text-indigo-400 dark:hover:text-indigo-300">Cancel and return Home</a>
    </form>
  </div>
</section>
