<article class="workspace-panel overflow-hidden">
  <div class="flex flex-wrap items-center justify-between gap-3 border-b border-slate-200 px-5 py-4">
    <div class="flex flex-wrap items-center gap-2">
      <h2 class="text-lg font-semibold text-slate-950">Preview</h2>
      <span class="badge-neutral">revision {{ designState.revision() ?? '—' }}</span>
    </div>
    <button type="button" class="btn-secondary py-2" (click)="copyPreview()">{{ copied() ? 'Copied' : 'Copy' }}</button>
  </div>

  @if (designState.hasBlockingErrors()) {
    <div class="flex flex-wrap items-center justify-between gap-2 border-b border-rose-200 bg-rose-50 px-5 py-3 text-sm font-semibold text-rose-700">
      <span>Export is blocked by {{ designState.errorIssueCount() }} error(s).</span>
      <button type="button" class="btn-ghost text-rose-700 hover:bg-rose-100 hover:text-rose-800" (click)="openIssues.emit()">View issues</button>
    </div>
  }

  <div class="grid grid-cols-2 border-b border-slate-200 text-sm font-semibold">
    <button
      type="button"
      class="px-3 py-2"
      [class.bg-slate-950]="activeTab() === 'sql'"
      [class.text-white]="activeTab() === 'sql'"
      (click)="activeTab.set('sql')"
    >
      SQL
    </button>
    <button
      type="button"
      class="px-3 py-2"
      [class.bg-slate-950]="activeTab() === 'dbml'"
      [class.text-white]="activeTab() === 'dbml'"
      (click)="activeTab.set('dbml')"
    >
      DBML
    </button>
  </div>

  <pre class="code-preview"><code>{{ activePreviewText() }}</code></pre>
</article>
