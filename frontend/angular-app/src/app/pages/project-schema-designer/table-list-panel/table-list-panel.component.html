<div class="workspace-panel flex h-full flex-col overflow-hidden">
  <div class="border-b border-slate-200 px-4 py-3">
    <h2 class="section-title">Tables</h2>
  </div>

  <div class="scrollbar-thin flex-1 space-y-1.5 overflow-y-auto p-3">
    @for (table of sortedTables(); track table.id) {
      <button
        type="button"
        class="flex w-full items-center justify-between gap-3 rounded-lg border px-3 py-2.5 text-left text-sm font-semibold transition hover:border-indigo-200 hover:bg-indigo-50 hover:text-indigo-700"
        [ngClass]="table.id === selectedTableId() ? 'border-indigo-200 bg-indigo-50 text-indigo-700' : 'border-transparent text-slate-600'"
        (click)="onSelect(table.id)"
      >
        <span class="min-w-0 flex-1">
          <span class="block truncate">{{ table.name }}</span>
          <span class="mt-0.5 block truncate text-xs font-normal text-slate-500">{{ designState.columnsForTable(table.id).length }} columns</span>
        </span>

        @if (designState.tableBadgeSeverity(table.id); as severity) {
          @if (severity === 'error') {
            <span class="badge-danger shrink-0">{{ errorCount(table.id) }} error{{ errorCount(table.id) === 1 ? '' : 's' }}</span>
          } @else {
            <span class="badge-warning shrink-0">{{ warningCount(table.id) }} warning{{ warningCount(table.id) === 1 ? '' : 's' }}</span>
          }
        }
      </button>
    } @empty {
      <p class="px-2 py-6 text-center text-sm text-slate-500">No tables yet. Add one below or generate a design.</p>
    }
  </div>

  <div class="border-t border-slate-200 p-3">
    <form class="space-y-2" (ngSubmit)="addTable()">
      <div class="flex gap-2">
        <input
          class="input-field"
          type="text"
          name="newTableName"
          placeholder="New table name"
          autocomplete="off"
          [(ngModel)]="newTableName"
          (keydown.escape)="cancelAddTable()"
          [disabled]="savingAdd()"
        />
        <button type="submit" class="btn-primary shrink-0" [disabled]="savingAdd() || !newTableName.trim()">Add</button>
      </div>

      @if (savingField() === 'newTable') {
        <p class="text-[11px] font-semibold uppercase tracking-wide text-slate-400">{{ savingAdd() ? 'Saving…' : 'Saved' }}</p>
      }

      @if (addError()) {
        <p class="text-xs font-semibold text-rose-600">{{ addError() }}</p>
      }
    </form>
  </div>
</div>
