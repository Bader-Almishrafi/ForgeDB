<section class="h-full flex flex-col bg-slate-50 dark:bg-[#0d1117] transition-colors duration-300 min-h-[calc(100vh-80px)] -m-4 md:-m-6 lg:-m-8 p-4 md:p-6 lg:p-8 relative">
  <!-- Subtle decorative background element for glassmorphism effect -->
  <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-indigo-500/10 via-transparent to-transparent pointer-events-none"></div>

  <div class="mb-8 relative z-10 max-w-4xl mx-auto w-full">
    <h1 class="text-3xl font-bold text-slate-900 dark:text-white tracking-tight transition-colors duration-300">My Profile</h1>
    <p class="mt-2 text-sm text-slate-600 dark:text-slate-400 max-w-2xl transition-colors duration-300">Manage your account preferences and personal information.</p>
  </div>

  <article class="rounded-2xl border border-white/40 dark:border-white/10 bg-white/70 dark:bg-[#161b22]/70 backdrop-blur-xl p-6 sm:p-8 shadow-xl transition-colors duration-300 mb-8 max-w-4xl mx-auto w-full relative z-10">
    <h2 class="text-xl font-bold text-slate-900 dark:text-white transition-colors duration-300 mb-8 flex items-center gap-2">
      <svg class="w-5 h-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
      Profile Information
    </h2>
    
    <div class="flex flex-col sm:flex-row gap-8 lg:gap-12 mb-8">
      <div class="flex flex-col items-center gap-4">
        <div class="w-28 h-28 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-4xl font-bold shadow-lg ring-4 ring-white/50 dark:ring-[#0d1117]/50 border border-indigo-200/50 dark:border-indigo-500/30">
          {{ user.firstName.charAt(0) }}{{ user.lastName.charAt(0) }}
        </div>
        <button type="button" class="text-sm font-bold text-indigo-700 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300 transition-colors py-1.5 px-3 rounded-xl hover:bg-white/80 dark:hover:bg-[#21262d]/80 backdrop-blur shadow-sm border border-transparent hover:border-slate-200/50 dark:hover:border-[#30363d]/50">
          Change Avatar
        </button>
      </div>

      <form (ngSubmit)="saveChanges()" class="flex-1 grid gap-6 sm:grid-cols-2">
        <label class="block">
          <span class="mb-2 block text-sm font-bold text-slate-700 dark:text-slate-300">First Name</span>
          <input type="text" name="firstName" [(ngModel)]="user.firstName" class="w-full appearance-none bg-white/60 dark:bg-[#0d1117]/60 backdrop-blur border border-slate-200/50 dark:border-[#30363d]/50 text-slate-700 dark:text-slate-300 text-sm font-semibold rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors shadow-sm" required>
        </label>
        
        <label class="block">
          <span class="mb-2 block text-sm font-bold text-slate-700 dark:text-slate-300">Last Name</span>
          <input type="text" name="lastName" [(ngModel)]="user.lastName" class="w-full appearance-none bg-white/60 dark:bg-[#0d1117]/60 backdrop-blur border border-slate-200/50 dark:border-[#30363d]/50 text-slate-700 dark:text-slate-300 text-sm font-semibold rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors shadow-sm" required>
        </label>

        <label class="block sm:col-span-2">
          <span class="mb-2 block text-sm font-bold text-slate-700 dark:text-slate-300">Email Address</span>
          <input type="email" name="email" [(ngModel)]="user.email" class="w-full appearance-none bg-white/60 dark:bg-[#0d1117]/60 backdrop-blur border border-slate-200/50 dark:border-[#30363d]/50 text-slate-700 dark:text-slate-300 text-sm font-semibold rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors shadow-sm" required>
        </label>

        <div class="sm:col-span-2 mt-4 pt-6 border-t border-slate-200/50 dark:border-[#30363d]/50 flex items-center justify-between gap-4 flex-wrap-reverse">
          @if (successMessage) {
            <span class="flex items-center text-sm font-bold text-emerald-700 dark:text-emerald-400 bg-emerald-50/80 dark:bg-emerald-500/10 backdrop-blur px-4 py-2 rounded-xl border border-emerald-200/50 dark:border-emerald-500/30 shadow-sm">
              <svg class="w-4 h-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
              </svg>
              {{ successMessage }}
            </span>
          } @else {
            <div></div> <!-- Empty div for flex spacing -->
          }
          <button type="submit" class="flex items-center gap-2 rounded-xl bg-gradient-to-r from-indigo-500 to-indigo-600 px-6 py-3 text-sm font-bold text-white hover:from-indigo-600 hover:to-indigo-700 transition-all shadow-lg shadow-indigo-500/30 hover:scale-[1.02]">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>
            Save Changes
          </button>
        </div>
      </form>
    </div>
  </article>
</section>
