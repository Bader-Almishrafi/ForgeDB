<div class="grid-surface relative flex min-h-screen items-center justify-center p-4">
  <div class="absolute inset-0 page-glow pointer-events-none"></div>
  <div class="absolute left-6 top-6 z-10">
    <a routerLink="/" class="flex items-center gap-2 text-sm font-semibold text-[#64748b] transition-colors duration-300 hover:text-indigo-600 dark:text-[#8a99ad] dark:hover:text-white">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
      Back to Home
    </a>
  </div>
  <div class="glass-card relative z-20 w-full max-w-[480px] p-8 sm:p-10">
    <div class="mb-8 text-center">
      <h1 class="page-title">Create an account</h1>
      <p class="page-subtitle">Register, then create your first ForgeDB project.</p>
    </div>

    <form #signupForm="ngForm" (ngSubmit)="signupForm.form.valid && onRegister()" class="flex flex-col gap-5">
      <label>
        <span class="mb-2 block text-sm font-semibold text-slate-800 dark:text-slate-200">Full Name</span>
        <input type="text" name="fullName" [(ngModel)]="fullName" #nameInput="ngModel" class="input-field"
          placeholder="John Doe" required>
        @if (nameInput.invalid && (nameInput.dirty || nameInput.touched)) {
          <p class="mt-1 text-xs font-semibold text-rose-600 dark:text-rose-400">Full name is required.</p>
        }
      </label>

      <label>
        <span class="mb-2 block text-sm font-semibold text-slate-800 dark:text-slate-200">Email Address</span>
        <input type="email" name="email" [(ngModel)]="email" #emailInput="ngModel" class="input-field"
          placeholder="name@example.com" required email>
        @if (emailInput.invalid && (emailInput.dirty || emailInput.touched)) {
          <p class="mt-1 text-xs font-semibold text-rose-600 dark:text-rose-400">Please enter a valid email.</p>
        }
      </label>

      <label>
        <span class="mb-2 block text-sm font-semibold text-slate-800 dark:text-slate-200">Password</span>
        <input type="password" name="password" [(ngModel)]="password" #passInput="ngModel" class="input-field"
          placeholder="Password" required minlength="8">
        @if (passInput.invalid && (passInput.dirty || passInput.touched)) {
          <p class="mt-1 text-xs font-semibold text-rose-600 dark:text-rose-400">Password must be at least 8 characters.</p>
        }
      </label>

      <label>
        <span class="mb-2 block text-sm font-semibold text-slate-800 dark:text-slate-200">Confirm Password</span>
        <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" #confirmInput="ngModel"
          class="input-field" placeholder="Confirm password" required>
        @if (confirmInput.touched && (confirmInput.invalid || password !== confirmPassword)) {
          <p class="mt-1 text-xs font-semibold text-rose-600 dark:text-rose-400">
            @if (confirmInput.errors?.['required']) { Confirm password is required. }
            @else if (password !== confirmPassword) { Passwords do not match. }
          </p>
        }
      </label>

      @if (errorMessage) {
        <p class="rounded-xl border border-rose-200 bg-rose-50 px-3 py-2 text-sm font-semibold text-rose-700 dark:border-rose-900/30 dark:bg-rose-900/10 dark:text-rose-400">
          {{ errorMessage }}
        </p>
      }

      <button type="submit" [disabled]="!signupForm.form.valid || password !== confirmPassword || isLoading"
        class="btn-primary">
        {{ isLoading ? 'Creating account...' : 'Register' }}
      </button>

      <p class="text-center text-sm text-slate-500 dark:text-[#8a99ad]">
        Already have an account?
        <a routerLink="/login" class="font-semibold text-indigo-600 hover:text-indigo-700 dark:text-indigo-400 dark:hover:text-indigo-300">Sign in</a>
      </p>
    </form>
  </div>
</div>
