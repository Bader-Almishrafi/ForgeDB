<div style="display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 1rem;">

	<div class="card" style="width: 100%; max-width: 480px; padding: 2.5rem;">

		<div style="text-align: center; margin-bottom: 2rem;">
			<h1 class="page-title">Create an account</h1>
			<p class="page-subtitle">Get started with ForgeDB today</p>
		</div>

		<form style="display: flex; flex-direction: column; gap: 1.25rem;">

			<div>
				<label
					style="display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; color: #13213c;">Full
					Name</label>
				<input type="text" class="input-field" placeholder="John Doe" required>
			</div>

			<div>
				<label
					style="display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; color: #13213c;">Email
					Address</label>
				<input type="email" class="input-field" placeholder="name@example.com" required>
			</div>

			<div>
				<label
					style="display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; color: #13213c;">Password</label>
				<input type="password" class="input-field" placeholder="••••••••" required>
			</div>

			<div>
				<label
					style="display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; color: #13213c;">Confirm
					Password</label>
				<input type="password" class="input-field" placeholder="••••••••" required>
			</div>

			<button type="submit" class="btn-primary" style="margin-top: 0.5rem;">
				Register
			</button>

			<p style="text-align: center; font-size: 0.875rem; color: #64748b; margin-top: 0.5rem;">
				Already have an account?
				<a routerLink="/login" style="color: #4f46e5; font-weight: 600; text-decoration: none;">Sign in</a>
			</p>

		</form>

	</div>
</div>
