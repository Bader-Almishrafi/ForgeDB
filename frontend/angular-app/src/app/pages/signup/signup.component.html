<div class="flex min-h-screen items-center justify-center p-4">
  <div class="card w-full max-w-[480px] p-8 sm:p-10">
    <div class="mb-8 text-center">
      <h1 class="page-title">Create an account</h1>
      <p class="page-subtitle">Register, then create your first ForgeDB project.</p>
    </div>

    <form #signupForm="ngForm" (ngSubmit)="signupForm.form.valid && onRegister()" class="flex flex-col gap-5">
      <label>
        <span class="mb-2 block text-sm font-semibold text-slate-800">Full Name</span>
        <input type="text" name="fullName" [(ngModel)]="fullName" #nameInput="ngModel" class="input-field"
          placeholder="John Doe" required>
        @if (nameInput.invalid && (nameInput.dirty || nameInput.touched)) {
          <p class="mt-1 text-xs font-semibold text-rose-600">Full name is required.</p>
        }
      </label>

      <label>
        <span class="mb-2 block text-sm font-semibold text-slate-800">Email Address</span>
        <input type="email" name="email" [(ngModel)]="email" #emailInput="ngModel" class="input-field"
          placeholder="name@example.com" required email>
        @if (emailInput.invalid && (emailInput.dirty || emailInput.touched)) {
          <p class="mt-1 text-xs font-semibold text-rose-600">Please enter a valid email.</p>
        }
      </label>

      <label>
        <span class="mb-2 block text-sm font-semibold text-slate-800">Password</span>
        <input type="password" name="password" [(ngModel)]="password" #passInput="ngModel" class="input-field"
          placeholder="Password" required minlength="8">
        @if (passInput.invalid && (passInput.dirty || passInput.touched)) {
          <p class="mt-1 text-xs font-semibold text-rose-600">Password must be at least 8 characters.</p>
        }
      </label>

      <label>
        <span class="mb-2 block text-sm font-semibold text-slate-800">Confirm Password</span>
        <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" #confirmInput="ngModel"
          class="input-field" placeholder="Confirm password" required>
        @if (confirmInput.touched && (confirmInput.invalid || password !== confirmPassword)) {
          <p class="mt-1 text-xs font-semibold text-rose-600">
            @if (confirmInput.errors?.['required']) { Confirm password is required. }
            @else if (password !== confirmPassword) { Passwords do not match. }
          </p>
        }
      </label>

      @if (errorMessage) {
        <p class="rounded-xl border border-rose-200 bg-rose-50 px-3 py-2 text-sm font-semibold text-rose-700">
          {{ errorMessage }}
        </p>
      }

      <button type="submit" [disabled]="!signupForm.form.valid || password !== confirmPassword || isLoading"
        class="btn-primary">
        {{ isLoading ? 'Creating account...' : 'Register' }}
      </button>

      <p class="text-center text-sm text-slate-500">
        Already have an account?
        <a routerLink="/login" class="font-semibold text-indigo-600 hover:text-indigo-700">Sign in</a>
      </p>
    </form>
  </div>
</div>
