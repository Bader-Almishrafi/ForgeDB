<section class="mx-auto max-w-2xl" data-testid="create-project-page">
  <a routerLink="/projects" class="text-sm font-semibold text-indigo-700 hover:text-indigo-600 dark:text-indigo-300">← Back to Projects</a>

  <div class="mt-6 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-[#161b22] sm:p-8">
    <p class="eyebrow">New project</p>
    <h1 class="mt-2 text-3xl font-bold tracking-tight text-slate-950 dark:text-white">Create Project</h1>
    <p class="mt-2 text-sm text-slate-600 dark:text-slate-400">Create an empty project, then add datasets from its Data step.</p>

    <form class="mt-8 space-y-6" [formGroup]="projectForm" (ngSubmit)="createProject()" novalidate>
      <label class="block" for="project-name">
        <span class="text-sm font-semibold text-slate-800 dark:text-slate-200">Project name</span>
        <input id="project-name" data-testid="project-name" type="text" formControlName="name" maxlength="100"
          class="input-field mt-2" autocomplete="off" placeholder="Customer analytics" autofocus>
        @if (projectForm.controls.name.touched && projectForm.controls.name.invalid) {
          <span class="mt-2 block text-sm text-rose-600" role="alert">
            @if (projectForm.controls.name.hasError('maxlength')) { Project name must be 100 characters or fewer. }
            @else { Enter a project name that is not only whitespace. }
          </span>
        }
      </label>

      <label class="block" for="project-description">
        <span class="text-sm font-semibold text-slate-800 dark:text-slate-200">Description <span class="font-normal text-slate-400">(optional)</span></span>
        <textarea id="project-description" data-testid="project-description" formControlName="description" maxlength="500"
          class="input-field mt-2 min-h-32 resize-y" placeholder="What is this project for?"></textarea>
        @if (projectForm.controls.description.touched && projectForm.controls.description.hasError('maxlength')) {
          <span class="mt-2 block text-sm text-rose-600" role="alert">Description must be 500 characters or fewer.</span>
        }
      </label>

      @if (errorMessage()) {
        <div class="rounded-xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700 dark:border-rose-900/50 dark:bg-rose-950/20 dark:text-rose-300" role="alert">
          {{ errorMessage() }}
        </div>
      }

      <div class="flex flex-col-reverse gap-3 border-t border-slate-200 pt-6 dark:border-slate-800 sm:flex-row sm:justify-end">
        <a routerLink="/projects" class="btn-secondary justify-center">Cancel</a>
        <button data-testid="create-project-button" type="submit" class="btn-primary justify-center" [disabled]="submitting()">
          {{ submitting() ? 'Creating…' : 'Create Project' }}
        </button>
      </div>
    </form>
  </div>
</section>
